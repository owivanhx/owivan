<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>﹒ㅤowiwan</title>
    <link rel="icon" type="image/x-icon" href="bluey.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
    :root {
        --bg-body: #ffffff;
        --bg-window: #ffffff;
        --text-main: #333333;
        --text-date: #888888;
        --border-color: #e0e0e0;
    }
        
    body.dark-mode {
        --bg-body: #121212;
        --bg-window: #1e1e1e;
        --text-main: #e0e0e0;
        --text-date: #aaaaaa;
        --border-color: #333333;
    }
        
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: var(--bg-body);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text-main);
        transition: background 0.3s ease, color 0.3s ease;
    }

    .window {
        width: 500px;
        background: var(--bg-window);
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border: 1px solid var(--border-color);
        overflow: hidden;
        text-align: center;
        padding-bottom: 20px;
        color: var(--text-main);
    }

    .top-bar {
        display: flex;
        align-items: center;
        padding: 10px 15px;
        border-bottom: 1px solid var(--border-color);
        background-color: var(--bg-window);
    }

    .dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .red { background: #ff5f56; }
    .yellow { background: #ffbd2e; }
    .green { background: #27c93f; }

    .search-bar {
        background: var(--border-color);
        margin: 0 auto;
        padding: 4px 15px;
        border-radius: 5px;
        font-size: 12px;
        color: var(--text-main);
        width: 50%;
    }

    .clock {
        font-size: 64px;
        margin-top: 40px;
        font-weight: 300;
    }

    .date {
        font-size: 14px;
        color: var(--text-date);
        margin-bottom: 40px;
    }

    .links-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
    }

    .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        color: var(--text-main);
        font-size: 12px;
    }

    /* Correção da Imagem Circular */
    .circle {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin-bottom: 8px;
        border: 1px solid var(--border-color);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #eee;
    }

    .circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
    }

    .item:hover .circle img {
        transform: scale(1.2);
    }

    .footer-badge {
        display: inline-block;
        background: var(--border-color);
        color: var(--text-main);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 10px;
        text-transform: lowercase;
    }

    .theme-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: 1px solid var(--border-color);
        background: var(--bg-window);
        color: var(--text-main);
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: all 0.3s ease;
        z-index: 1000;
    }
    </style>
</head>
<body>

    <div class="window">
        <div class="top-bar">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="search-bar">www.owiwan.com</div>
        </div>

        <div id="clock" class="clock">00:00</div>
        <div id="date" class="date">carregando...</div>

        <div class="links-container">
            <a href="#" class="item">
                <div class="circle"><img src="imagens/img1.jpg"></div>
                <span>about me</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="imagens/img2.jpg"></div>
                <span>i likes</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="imagens/img3.jpg"></div>
                <span>shrine</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="imagens/img4.jpg"></div>
                <span>social medias</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="imagens/img5.jpg"></div>
                <span>my shop</span>
            </a>
        </div>

        <div class="footer-badge">made by owivan</div>
    </div>
    
</div> <button id="theme-toggle" class="theme-btn" title="mudar tema">
    <i class="fa-solid fa-moon"></i>
</button>
    
    <script src="script.js"></script>
</body>
</html>
