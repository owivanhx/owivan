<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>﹒ㅤowiwan [milgram]</title>
    <link rel="icon" type="image/x-icon" href="bluey.png">
    
    <style>
        /* Cores Temáticas de MILGRAM (Prisão / Sala de Interrogatório / Veredito) */
        :root {
            --bg-body: #0d1117;          /* Escuro profundo metálico */
            --bg-window: #161b22;        /* Painel interno da cela */
            --text-main: #f0f6fc;        /* Texto claro contrastante */
            --text-date: #8b949e;        /* Cinza de prontuário */
            --border-color: #30363d;     /* Grades / Estrutura metálica */
            --milgram-red: #ff3333;      /* Vermelho de Alerta / Culpado (Guilty) */
        }
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-body);
            font-family: 'Courier New', Courier, monospace; /* Fonte mecânica estilo terminal/interrogatório */
            color: var(--text-main);
        }

        .window {
            width: 500px;
            background: var(--bg-window);
            border-radius: 4px; /* Bordas mais retas e industriais */
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.15); /* Brilho vermelho sutil */
            border: 2px solid var(--border-color);
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 2px solid var(--milgram-red); /* Linha divisória de alerta */
            background-color: #0d1117;
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        /* Luzes indicadoras da prisão */
        .red { background: var(--milgram-red); }
        .yellow { background: #555; }
        .green { background: #333; }

        .search-bar {
            background: #21262d;
            margin: 0 auto;
            padding: 4px 15px;
            border-radius: 3px;
            font-size: 11px;
            color: var(--milgram-red); /* Texto da barra em vermelho */
            letter-spacing: 1px;
            width: 50%;
            border: 1px solid var(--border-color);
        }

        .clock {
            font-size: 64px;
            margin-top: 40px;
            font-weight: bold;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(240, 246, 252, 0.3);
        }

        .date {
            font-size: 13px;
            color: var(--text-date);
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .links-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .circle {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            margin-bottom: 8px;
            border: 2px solid var(--border-color);
            overflow: hidden;
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: border-color 0.4s ease;
        }

        .circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(80%); /* Efeito mais melancólico/sombrio nas fotos */
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        /* Efeito Hover Temático MILGRAM */
        .item:hover .circle {
            border-color: var(--milgram-red); /* Círculo acende em vermelho */
        }

        .item:hover .circle img {
            transform: scale(1.15);
            filter: grayscale(0%); /* A foto ganha cor ao passar o mouse */
        }

        .footer-badge {
            display: inline-block;
            background: #21262d;
            color: var(--text-date);
            border: 1px solid var(--border-color);
            padding: 4px 15px;
            border-radius: 2px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="top-bar">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="search-bar">PRISONER_LOG // OWIWAN</div>
        </div>

        <div class="clock">00:00</div>
        <div class="date">Milgram Interrogation Room</div>

        <div class="links-container">
            <a href="about.html" class="item">
                <div class="circle"><img src="imagens/img1.jpg"></div>
                <span>about me</span>
            </a>
            <a href="likes.html" class="item">
                <div class="circle"><img src="imagens/img2.jpg"></div>
                <span>i likes</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="imagens/img3.jpg"></div>
                <span>shrine</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="imagens/img4.jpg"></div>
                <span>socials</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="imagens/img5.jpg"></div>
                <span>my shop</span>
            </a>
        </div>

        <div class="footer-badge">prisoner id: #000</div>
    </div>

</body>
</html>
