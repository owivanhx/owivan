<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owiwan</title>
    <link rel="icon" type="image/x-icon" href="bluey.png">
    
    <style>
        /* Variáveis de Cores */
        :root {
            --bg-body: #ffffff;
            --bg-window: #ffffff;
            --text-main: #333333;
            --text-date: #888888;
            --border-color: #e0e0e0;
        }

        /* Configurações de Fundo e Texto */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-body);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
        }

        /* Container Principal */
        .window {
            width: 500px;
            background: var(--bg-window);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
        }

        /* Barra Superior */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .search-bar {
            background: var(--border-color);
            margin: 0 auto;
            padding: 4px 15px;
            border-radius: 5px;
            font-size: 11px;
            width: 50%;
            color: var(--text-main);
        }

        /* Relógio e Data */
        .clock {
            font-size: 64px;
            margin-top: 40px;
            font-weight: 300;
        }

        .date {
            font-size: 14px;
            color: var(--text-date);
            margin-bottom: 40px;
        }

        /* Navegação */
        .links-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            font-size: 12px;
        }

        .circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        /* Efeito Hover nas Imagens */
        .item:hover .circle img {
            transform: scale(1.2);
        }

        .footer-badge {
            display: inline-block;
            background: var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="top-bar">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="search-bar">www.owiwan.com</div>
        </div>

        <div class="clock">21:00</div>
        <div class="date">8월 16일 화요일</div>

        <div class="links-container">
            <a href="about.html" class="item">
                <div class="circle"><img src="/imagens/img1.jpg" alt="about"></div>
                <span>about</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="/imagens/img2.jpg" alt="likes"></div>
                <span>likes</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="/imagens/img3.jpg" alt="..."></div>
                <span>...</span>
            </a>
            <a href="#" class="item">
                <div class="circle"><img src="/imagens/img4.jpg" alt="social"></div>
                <span>social medias</span>
            </a>
        </div>

        <div class="footer-badge">made by owivan</div>
    </div>

</body>
</html>
