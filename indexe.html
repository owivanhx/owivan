<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owiwan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="window">
        <div class="top-bar">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="search-bar">www.owiwan.com</div>
        </div>

        <div class="content">
            <div id="clock" class="clock">00:00</div>
            <div id="date" class="date">carregando...</div>

            <div class="links-container">
                <div class="item"><div class="circle"></div><span>about</span></div>
                <div class="item"><div class="circle"></div><span>likes</span></div>
                <div class="item"><div class="circle"></div><span>...</span></div>
                <div class="item"><div class="circle"></div><span>social medias</span></div>
            </div>

            <div class="footer-badge">made with carrd</div>
        </div>
    </div>

    <button id="theme-toggle" class="theme-btn">
        <i class="fa-solid fa-moon"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
